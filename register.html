<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🚀 Register - CHESS × SUNIX</title>

<style>

body{

font-family:Arial,sans-serif;
background:#020617;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}


.box{

background:rgba(255,255,255,0.1);

padding:40px;

border-radius:20px;

text-align:center;

width:350px;

}


input{

width:100%;

padding:12px;

margin:10px 0;

border-radius:10px;

border:none;

}


button{

padding:12px 25px;

border:none;

border-radius:15px;

cursor:pointer;

}


button:hover{

background:#7fd8ff;

}


#result{

margin-top:15px;

color:#7fd8ff;

}

</style>

</head>


<body>


<div class="box">


<h1>♟ Join CHESS × SUNIX</h1>


<input id="username" placeholder="Username">


<input id="password" type="password" placeholder="Password">


<button onclick="register()">

Create Account 🚀

</button>


<p id="result"></p>


</div>





<script>

async function register(){

    let username =
    document.getElementById("username").value;


    let password =
    document.getElementById("password").value;


    let response = await fetch(
        "http://127.0.0.1:5000/register",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                username:username,
                password:password

            })
        }
    );


    let data = await response.json();


    document.getElementById("result").innerHTML =
    data.message;

}

</script>


</body>

</html>
