<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 Leaderboard - CHESS × SUNIX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:Arial,sans-serif;

background:
radial-gradient(circle at 20% 20%,#345,#0000 30%),
linear-gradient(#020617,#081420);

color:white;

min-height:100vh;

padding:30px;

}



.container{

max-width:900px;

margin:auto;

}



.card{

background:rgba(255,255,255,0.1);

backdrop-filter:blur(10px);

border-radius:20px;

padding:30px;

border:1px solid rgba(255,255,255,0.15);

}



h1{

text-align:center;

color:#7fd8ff;

margin-bottom:25px;

}



.player{

display:flex;

justify-content:space-between;

padding:15px;

margin:10px 0;

background:rgba(255,255,255,0.08);

border-radius:15px;

font-size:18px;

}



.rank{

font-weight:bold;

}



</style>

</head>


<body>


<div class="container">


<div class="card">


<h1>🏆 CHESS × SUNIX Leaderboard</h1>


<div id="leaderboard">

Loading players... 🚀

</div>


</div>


</div>





<script>


async function loadLeaderboard(){


let response = await fetch(

"http://127.0.0.1:5000/leaderboard"

);


let data = await response.json();



let box =
document.getElementById("leaderboard");


box.innerHTML="";



data.leaderboard.forEach(
(player,index)=>{


let div=document.createElement("div");


div.className="player";


let medal="";


if(index===0) medal="🥇";
else if(index===1) medal="🥈";
else if(index===2) medal="🥉";
else medal="♟";



div.innerHTML=`

<span class="rank">
${medal} ${index+1}
</span>

<span>
${player.username}
</span>

<span>
${player.rating}
</span>

`;



box.appendChild(div);


}

);



}



loadLeaderboard();


</script>


</body>

</html>
