<!DOCTYPE html>
<html>

<head>

<title>♟ Profile - CHESS × SUNIX</title>

<style>

body{

font-family:Arial;
background:#020617;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}


.card{

background:rgba(255,255,255,0.1);

padding:40px;

border-radius:20px;

text-align:center;

width:400px;

}


h1{
color:#7fd8ff;
}


.stat{

margin:15px;

font-size:18px;

}


</style>

</head>


<body>


<div class="card">


<h1>♟ Player Profile</h1>


<div class="stat">
Username: <span id="username">Loading...</span>
</div>


<div class="stat">
Rating: <span id="rating">800</span>
</div>


<div class="stat">
XP: <span id="xp">0</span>
</div>


<div class="stat">
Games: <span id="games">0</span>
</div>


<h2>🏆 Achievements</h2>


<p>
🌱 New Player
</p>


</div>
  <script>

async function loadProfile(){


let username = "TEST_USERNAME";


let response = await fetch(

"http://127.0.0.1:5000/profile/"
+ username

);


let data = await response.json();



document.getElementById("username").innerHTML =
data.username;


document.getElementById("rating").innerHTML =
data.rating;


document.getElementById("xp").innerHTML =
data.xp;


document.getElementById("games").innerHTML =
data.games;


}



loadProfile();

</script>



</body>

</html>
